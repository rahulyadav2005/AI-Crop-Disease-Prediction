<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Crop Disease Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    

</head>

<body>

    <header>

        <h1>🌿 AI Crop Disease Prediction</h1>

        <p>Upload a crop leaf image and detect disease using Artificial Intelligence.</p>

    </header>

    <div class="container">
        <div class="hero-image">
    <img src="{{ url_for('static', filename='Images/hero.jpg') }}" alt="Farmer Banner">
</div>

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <div class="upload-box">

                <input
                    type="file"
                    name="image"
                    id="image"
                    accept="image/*"
                    required>

                <label for="image">
                    📷 Click here to Upload Leaf Image
                </label>
                <p id="file-name" style="margin-top:15px;color:gray;"></p>

            </div>

            <button type="submit">
                Predict Disease
            </button>

        </form>

    </div>

    <footer>

        <p>
             project of ======IBM iternship===== AI Crop Disease Prediction | Rahul Yadav batch 10  cell no 22 
        </p>

    </footer>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
