<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <h1>🌿 AI Crop Disease Prediction</h1>

    <p>Prediction Result</p>

</header>

<div class="container">

    <h2 style="text-align:center;margin-bottom:20px;">
        Prediction Completed
    </h2>

    <img src="{{ image_path }}"
         alt="Uploaded Image"
         style="width:250px;
                display:block;
                margin:auto;
                border-radius:10px;">

    <hr style="margin:25px 0;">

    <h3>🌱 Disease Name</h3>

    <p>{{ disease }}</p>

    <br>

    <h3>📊 Confidence</h3>

    <p>{{ confidence }} %</p>

    <br>

    <h3>💊 Treatment</h3>

    <p>{{ treatment }}</p>

    <br>

    <h3>🛡 Prevention</h3>

    <p>{{ prevention }}</p>

    <br>

    <h3>🌿 Fertilizer Recommendation</h3>

    <p>{{ fertilizer }}</p>

    <br>

    <div style="text-align:center;">

        <a href="/">

            <button>
                Predict Another Image
            </button>

        </a>

    </div>

</div>

<footer>

    © 2026 AI Crop Disease Prediction

</footer>

</body>

</html>
